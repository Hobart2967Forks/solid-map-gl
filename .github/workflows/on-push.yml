name: Build & Release
on: push

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Tag Package with Hobart2967
        run: |
          jq '.name = "@hobart2967/solid-map-gl"' package.json > package.tmp.json
          mv package.tmp.json package.json
      - name: Install dependencies
        run: yarn
      - name: Build Project
        run: yarn build
      - name: Prepare new version
        if: github.ref_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx semantic-release
